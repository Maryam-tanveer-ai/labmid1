<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart — EatDesi</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html" aria-label="EatDesi Home">
      <span class="brand-badge" aria-hidden="true"></span>
      <span>EatDesi</span>
    </a>

    <div class="nav-links" role="navigation" aria-label="Primary">
      <a href="menu.html">Menu</a>
      <a href="checkout.html">Checkout</a>
      <a href="#cart">Cart</a>
    </div>

    <div class="nav-actions">
      <a class="pill" href="cart.html" aria-label="View cart">
        <span aria-hidden="true">🛒</span>
        <span>Cart</span>
        <strong id="navCartCount">0</strong>
      </a>
    </div>
  </div>
</nav>

<main class="section" id="cart">
  <div class="container">
    <div class="section-head">
      <div>
        <h2 class="reveal">Your cart</h2>
        <p class="lead reveal">Adjust quantities or remove items.</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap">
        <a class="btn btn-ghost" href="menu.html">← Continue shopping</a>
        <a class="btn btn-primary" href="checkout.html">Proceed to Checkout</a>
      </div>
    </div>

    <section class="panel reveal">
      <div class="panel-inner">
        <div id="cartEmpty" class="muted" style="display:none">
          Your cart is empty. Add products from the menu.
        </div>
        <div id="cartItems" class="row" style="gap: 12px"></div>
        <div class="spacer-18"></div>
        <div id="cartTotals"></div>
      </div>
    </section>
  </div>
</main>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <div class="brand" style="margin-bottom: 8px">
        <span class="brand-badge" aria-hidden="true"></span>
        <span>EatDesi</span>
      </div>
      <p>Pure desi essentials — delivered with care.</p>
      <div class="spacer-10"></div>
      <p class="muted">Contact: +92 300 0000000 • support@eatdesi.pk</p>
    </div>
    <div class="social" aria-label="Social links">
      <a class="btn btn-ghost btn-small" href="https://www.facebook.com/eatdesi.pk/" target="_blank" rel="noreferrer">Facebook</a>
      <a class="btn btn-ghost btn-small" href="#" aria-disabled="true">Instagram</a>
      <a class="btn btn-ghost btn-small" href="#" aria-disabled="true">TikTok</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>

</body>
</html>
